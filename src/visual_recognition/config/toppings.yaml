toppings:
  - key: cilantro
    name_en: cilantro
    name_zh: 香菜
    desc_en: "fresh cilantro coriander herb, flat jagged green leaves, small bunch garnish on rice"
    desc_zh: "新鮮香菜葉點綴"
    threshold: 0.45
  - key: braised_egg
    name_en: braised egg
    name_zh: 滷蛋
    desc_en: "whole dark brown braised egg, soy sauce marinated"
    desc_zh: "深褐色整顆滷蛋"
  - key: tofu
    name_en: braised tofu
    name_zh: 豆腐
    desc_en: "braised tofu block, dark brown surface from soy sauce"
    desc_zh: "滷豆腐，表面深褐色"
  - key: pickled_mustard
    name_en: pickled mustard greens
    name_zh: 酸菜
    desc_en: "pale yellow-green pickled mustard greens, fermented"
    desc_zh: "淡黃綠色醃製酸菜"
  - key: soft_boiled_egg
    name_en: soft boiled egg
    name_zh: 半熟荷包蛋
    desc_en: "fried egg with runny yolk on top of rice"
    desc_zh: "半熟蛋黃的荷包蛋"
  - key: hard_boiled_egg
    name_en: hard boiled egg
    name_zh: 全熟荷包蛋
    desc_en: "fully cooked fried egg with solid yolk on top of rice"
