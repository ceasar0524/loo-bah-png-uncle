    name_en: pickled yellow radish
    name_zh: 醃黃蘿蔔
    desc_en: "sliced yellow pickled radish, bright yellow color"
    desc_zh: "切片醃黃蘿蔔，鮮黃色"
  - key: cucumber
    name_en: sliced cucumber
    name_zh: 小黃瓜
    desc_en: "thin sliced green cucumber, bright green color"
